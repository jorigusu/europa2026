- DOCTYPE html, charset UTF-8, viewport meta, title "Europa Mayo 2026"
- Link al manifest.json
- Script que registra el service worker sw.js
- Todo el CSS inline en un bloque <style>
- Todo el JS inline en un bloque <script> al final del body
- El array DIAS con los 20 dias del itinerario que te pego abajo
- Las siguientes funciones: render(), toggleOpen(), toggleDone(), setFilter(), openMaps(), openClaude()
- La funcion openClaude(dia) debe abrir: https://claude.ai/new?q=Estoy+en+[ciudad]+el+[fecha].+[actividades].+Necesito+ayuda+con+mi+dia.
- Filtros: Todos / Pendientes / Completados / Hotel sin confirmar
- Barra de progreso
- Cada tarjeta: expandible, muestra hotel, banner de transporte, actividades con hora y descripcion, boton Google Maps, boton Preguntar a Claude
- Doble clic en cualquier campo de texto lo hace editable, los cambios se guardan en localStorage
- Boton resetear dia que restaura el contenido original
- Estado de dias completados guardado en localStorage bajo la clave itineu26
- Diseno responsivo, colores: verde #1D9E75, fondo blanco, texto oscuro
- Sin dependencias externas, todo debe funcionar offline
