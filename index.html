const STORAGE_KEY = 'itineu26';
const EDITS_KEY = 'itineu26_edits';
let state = { done: {}, open: {} };
let edits = {};
let currentFilter = 'todos';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { done: {}, open: {} }; } catch(e) { state = { done: {}, open: {} }; }
  try { edits = JSON.parse(localStorage.getItem(EDITS_KEY)) || {}; } catch(e) { edits = {}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function saveEdits() { localStorage.setItem(EDITS_KEY, JSON.stringify(edits)); }

function toggleOpen(id) {
  state.open[id] = !state.open[id];
  saveState();
  render();
}
function toggleDone(id) {
  state.done[id] = !state.done[id];
  saveState();
  render();
}
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function openMaps(q) {
  window.open('https://www.google.com/maps/search/?api=1&query=' + q, '_blank');
}
function openClaude(d) {
  const acts = d.acts.map(a => a.titulo).join(', ');
  const q = encodeURIComponent('Estoy en ' + d.ciudad + ' el ' + d.fecha + '. ' + acts + '. Necesito ayuda con mi dia.');
  window.open('https://claude.ai/new?q=' + q, '_blank');
}
function resetDia(id) {
  if (!confirm('¿Restaurar el día ' + id + ' al contenido original?')) return;
  const prefix = id + '_';
  Object.keys(edits).forEach(k => { if (k.startsWith(prefix)) delete edits[k]; });
  saveEdits();
  render();
}

function getDiasFiltered() {
  return DIAS.filter(d => {
    if (currentFilter === 'pendientes') return !state.done[d.dia];
    if (currentFilter === 'completados') return !!state.done[d.dia];
    if (currentFilter === 'hotel') return !d.hotelOk;
    return true;
  });
}

function flagEmoji(pais) {
  const map = { DO: '🇩🇴', DE: '🇩🇪', AT: '🇦🇹' };
  return map[pais] || '';
}

function render() {
  const dias = getDiasFiltered();
  const doneCount = DIAS.filter(d => state.done[d.dia]).length;
  document.getElementById('prog-label').textContent = doneCount + ' de 20 días completados';
  document.getElementById('prog-fill').style.width = (doneCount / 20 * 100) + '%';

  const main = document.getElementById('main');
  if (!dias.length) {
    main.innerHTML = '<div class="empty">No hay días en esta categoría</div>';
    return;
  }

  main.innerHTML = dias.map(d => {
    const isDone = !!state.done[d.dia];
    const isOpen = !!state.open[d.dia];
    const isWarn = !d.hotelOk;
    let cls = 'card';
    if (isDone) cls += ' done';
    if (isWarn) cls += ' hotel-warn';
    if (isOpen) cls += ' open';

    const hotelHtml = d.hotel ? `
      <div class="hotel-row">
        <span class="hotel-icon">🏨</span>
        <span class="hotel-name">${d.hotel}</span>
        ${!d.hotelOk ? '<span class="hotel-unconfirmed">SIN CONFIRMAR</span>' : ''}
      </div>` : '';

    const transpHtml = d.transp ? `
      <div class="transp-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        ${d.transp}
      </div>` : '';

    const actsHtml = d.acts.map((a, i) => {
      const titleKey = d.dia + '_' + i + '_titulo';
      const descKey = d.dia + '_' + i + '_desc';
      const titulo = edits[titleKey] !== undefined ? edits[titleKey] : a.titulo;
      const desc = edits[descKey] !== undefined ? edits[descKey] : a.desc;
      return `<div class="act">
        <div class="act-time">${a.t}</div>
        <div class="act-content">
          <div class="act-title" ondblclick="makeEditable(this,'${titleKey}')">${titulo}<span class="tag tag-${a.tag}">${a.tag}</span></div>
          <div class="act-desc" ondblclick="makeEditable(this,'${descKey}')">${desc}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="${cls}" id="card-${d.dia}">
      <div class="card-head" onclick="toggleOpen(${d.dia})">
        <div class="check ${isDone ? 'done' : ''}" onclick="event.stopPropagation();toggleDone(${d.dia})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="card-title-area">
          <div class="card-day">Día ${d.dia} · ${flagEmoji(d.pais)} ${d.pais}${isWarn ? '<span class="hotel-badge"> ⚠ hotel</span>' : ''}</div>
          <div class="card-city">${d.ciudad}</div>
          <div class="card-fecha">${d.fecha}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-body">
        ${transpHtml}
        ${hotelHtml}
        <div class="acts">${actsHtml}</div>
        <div class="card-actions">
          <button class="btn btn-maps" onclick="openMaps('${d.mapQ}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Maps
          </button>
          <button class="btn btn-claude" onclick="openClaude(DIAS[${d.dia - 1}])">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            Preguntar a Claude
          </button>
          <button class="btn btn-reset" onclick="resetDia(${d.dia})">↺</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function makeEditable(el, key) {
  el.contentEditable = true;
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  el.onblur = () => {
    el.contentEditable = false;
    edits[key] = el.innerText.trim();
    saveEdits();
  };
  el.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } };
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

loadState();
render();
</script>
</body>
</html>
